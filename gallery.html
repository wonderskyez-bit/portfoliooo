<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery — Skyé Lowe</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;1,9..40,300&family=La+Belle+Aurore&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cream: #FAF8F4;
    --ink: #1C1917;
    --warm-mid: #78716C;
    --rule: #E7E3DB;
    --rust: #9B4B2A;
    --blue: #4A6FA5;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--ink);
    font-size: 15px;
    line-height: 1.75;
    -webkit-font-smoothing: antialiased;
  }

  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 22px 60px;
    background: rgba(250,248,244,0.92);
    backdrop-filter: blur(8px);
    border-bottom: 1px solid var(--rule);
  }

  .nav-logo {
    font-family: 'La Belle Aurore', cursive;
    font-size: 1.9rem;
    color: var(--ink);
    text-decoration: none;
    font-weight: 700;
    -webkit-text-stroke: 0.5px var(--ink);
  }

  .nav-links {
    display: flex;
    gap: 36px;
    list-style: none;
  }
  .nav-links a {
    font-size: 0.78rem;
    letter-spacing: 0.13em;
    text-transform: uppercase;
    color: var(--warm-mid);
    text-decoration: none;
    font-weight: 400;
    transition: color 0.2s ease;
  }
  .nav-links a:hover { color: var(--blue); }
  .nav-links a.active { color: var(--ink); font-weight: 700; }

  .page-header {
    padding: 140px 60px 56px;
    max-width: 1100px;
    margin: 0 auto;
    border-bottom: 1px solid var(--rule);
    display: flex;
    align-items: baseline;
    gap: 20px;
  }

  .page-title {
    font-family: 'La Belle Aurore', cursive;
    font-size: 3rem;
    color: var(--ink);
    line-height: 1.1;
  }

  .page-subtitle {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1rem;
    font-weight: 300;
    color: var(--warm-mid);
    font-style: italic;
  }

  .gallery-section {
    max-width: 1100px;
    margin: 0 auto;
    padding: 48px 60px 120px;
  }

  .gallery-grid {
    columns: 3;
    column-gap: 16px;
  }

  .gallery-item {
    break-inside: avoid;
    margin-bottom: 16px;
    border-radius: 10px;
    overflow: hidden;
    cursor: pointer;
    position: relative;
    transition: transform 0.3s cubic-bezier(0.4,0,0.2,1),
                box-shadow 0.3s cubic-bezier(0.4,0,0.2,1);
  }
  .gallery-item:hover {
    transform: translateY(-4px);
    box-shadow: 0 12px 32px rgba(28,25,23,0.13);
  }
  .gallery-item img {
    width: 100%;
    height: auto;
    display: block;
  }
  .gallery-item .overlay {
    position: absolute;
    inset: 0;
    background: rgba(28,25,23,0);
    transition: background 0.3s ease;
  }
  .gallery-item:hover .overlay { background: rgba(28,25,23,0.12); }

  /* LIGHTBOX */
  .lightbox {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 200;
    background: rgba(28,25,23,0.93);
    align-items: center;
    justify-content: center;
    padding: 40px;
  }
  .lightbox.open { display: flex; }

  .lightbox-inner {
    position: relative;
    max-width: 900px;
    max-height: 90vh;
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .lightbox-inner img {
    max-width: 100%;
    max-height: 85vh;
    object-fit: contain;
    border-radius: 8px;
    display: block;
  }

  .lightbox-close {
    position: fixed;
    top: 28px; right: 40px;
    font-size: 0.72rem;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: rgba(250,248,244,0.65);
    cursor: pointer;
    font-weight: 400;
    transition: color 0.2s ease;
    background: none;
    border: none;
    font-family: 'DM Sans', sans-serif;
  }
  .lightbox-close:hover { color: var(--cream); }

  .lightbox-nav {
    position: fixed;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    color: rgba(250,248,244,0.5);
    font-size: 1.6rem;
    cursor: pointer;
    padding: 16px;
    transition: color 0.2s ease;
    line-height: 1;
  }
  .lightbox-nav:hover { color: var(--cream); }
  .lightbox-nav.prev { left: 20px; }
  .lightbox-nav.next { right: 20px; }

  footer {
    border-top: 1px solid var(--rule);
    padding: 24px 60px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .footer-script {
    font-family: 'La Belle Aurore', cursive;
    font-size: 1.1rem;
    color: var(--warm-mid);
  }
  .footer-copy {
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    color: var(--warm-mid);
    font-weight: 300;
  }

  .fade-in {
    opacity: 0;
    transform: translateY(18px);
    transition: opacity 0.6s ease, transform 0.6s ease;
  }
  .fade-in.visible { opacity: 1; transform: none; }

  @media (max-width: 900px) { .gallery-grid { columns: 2; } }
  @media (max-width: 768px) {
    nav {
      padding: 18px 24px;
      gap: 16px;
      overflow-x: auto;
      overscroll-behavior-x: contain;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    nav::-webkit-scrollbar { display: none; }
    .nav-links {
      gap: 20px;
      flex-wrap: nowrap;
      min-width: max-content;
      padding-bottom: 2px;
    }
    .nav-links a { white-space: nowrap; }
    .page-header { padding: 120px 24px 40px; flex-direction: column; gap: 8px; }
    .gallery-section { padding: 32px 24px 80px; }
    .gallery-grid { columns: 2; column-gap: 10px; }
    .gallery-item { margin-bottom: 10px; }
    .lightbox { padding: 16px; }
    .lightbox-nav { display: none; }
    footer { padding: 20px 24px; }
  }
  @media (max-width: 480px) { .gallery-grid { columns: 1; } }
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">Skyé</a>
  <ul class="nav-links">
    <li><a href="index.html#about">About</a></li>
    <li><a href="index.html#projects">Projects</a></li>
    <li><a href="index.html#accomplishments">Accomplishments</a></li>
    <li><a href="gallery.html" class="active">Gallery</a></li>
    <li><a href="index.html#contact">Contact</a></li>
  </ul>
</nav>

<div class="page-header fade-in">
  <h1 class="page-title">Gallery</h1>
  <span class="page-subtitle">through my lens</span>
</div>

<div class="gallery-section">
  <div class="gallery-grid" id="galleryGrid">

    <div class="gallery-item fade-in" onclick="openLightbox(0)">
      <img src="iloveimg-compressed/IMG_0923.jpg" alt="Ocean at dusk" loading="lazy" />
      <div class="overlay"></div>
    </div>

    <div class="gallery-item fade-in" onclick="openLightbox(1)">
      <img src="iloveimg-compressed/IMG_8849.jpeg" alt="Coastal cliffs, South of France" loading="lazy" />
      <div class="overlay"></div>
    </div>

    <div class="gallery-item fade-in" onclick="openLightbox(2)">
      <img src="iloveimg-compressed/IMG_0297.jpg" alt="Street in Aix-en-Provence" loading="lazy" />
      <div class="overlay"></div>
    </div>

    <div class="gallery-item fade-in" onclick="openLightbox(3)">
      <img src="iloveimg-compressed/IMG_0256.jpg" alt="Place des Vosges, Paris" loading="lazy" />
      <div class="overlay"></div>
    </div>

    <div class="gallery-item fade-in" onclick="openLightbox(4)">
      <img src="iloveimg-compressed/IMG_9414.jpg" alt="Skater, Washington Square Park" loading="lazy" />
      <div class="overlay"></div>
    </div>

    <div class="gallery-item fade-in" onclick="openLightbox(5)">
      <img src="iloveimg-compressed/IMG_0596.jpg" alt="Rooftops, Avignon" loading="lazy" />
      <div class="overlay"></div>
    </div>

    <div class="gallery-item fade-in" onclick="openLightbox(6)">
      <img src="iloveimg-compressed/IMG_0598.jpg" alt="Overlooking the city" loading="lazy" />
      <div class="overlay"></div>
    </div>

    <div class="gallery-item fade-in" onclick="openLightbox(7)">
      <img src="iloveimg-compressed/IMG_0655.jpg" alt="Evening boulevard, Lyon" loading="lazy" />
      <div class="overlay"></div>
    </div>

  </div>
</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
  <button class="lightbox-close" id="lightboxClose">Close ✕</button>
  <button class="lightbox-nav prev" id="lightboxPrev">&#8592;</button>
  <div class="lightbox-inner">
    <img src="" alt="" id="lightboxImg" />
  </div>
  <button class="lightbox-nav next" id="lightboxNext">&#8594;</button>
</div>

<footer>
  <span class="footer-script">Skyé Lowe</span>
  <span class="footer-copy">© 2026 · Princeton, NJ</span>
</footer>

<script>
  const observer = new IntersectionObserver((entries) => {
    entries.forEach((entry, i) => {
      if (entry.isIntersecting) {
        setTimeout(() => entry.target.classList.add('visible'), i * 80);
        observer.unobserve(entry.target);
      }
    });
  }, { threshold: 0.08 });
  document.querySelectorAll('.fade-in').forEach(el => observer.observe(el));

  const images = [
    { src: 'iloveimg-compressed/IMG_0923.jpg',  alt: 'Ocean at dusk' },
    { src: 'iloveimg-compressed/IMG_8849.jpeg', alt: 'Coastal cliffs, South of France' },
    { src: 'iloveimg-compressed/IMG_0297.jpg',  alt: 'Street in Aix-en-Provence' },
    { src: 'iloveimg-compressed/IMG_0256.jpg',  alt: 'Place des Vosges, Paris' },
    { src: 'iloveimg-compressed/IMG_9414.jpg',  alt: 'Skater, Washington Square Park' },
    { src: 'iloveimg-compressed/IMG_0596.jpg',  alt: 'Rooftops, Avignon' },
    { src: 'iloveimg-compressed/IMG_0598.jpg',  alt: 'Overlooking the city' },
    { src: 'iloveimg-compressed/IMG_0655.jpg',  alt: 'Evening boulevard, Lyon' },
  ];

  let current = 0;
  const lightbox    = document.getElementById('lightbox');
  const lightboxImg = document.getElementById('lightboxImg');

  function openLightbox(index) {
    current = index;
    lightboxImg.src = images[current].src;
    lightboxImg.alt = images[current].alt;
    lightbox.classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeLightbox() {
    lightbox.classList.remove('open');
    document.body.style.overflow = '';
  }

  document.getElementById('lightboxClose').addEventListener('click', closeLightbox);
  lightbox.addEventListener('click', (e) => { if (e.target === lightbox) closeLightbox(); });

  document.getElementById('lightboxPrev').addEventListener('click', (e) => {
    e.stopPropagation();
    current = (current - 1 + images.length) % images.length;
    lightboxImg.src = images[current].src;
    lightboxImg.alt = images[current].alt;
  });

  document.getElementById('lightboxNext').addEventListener('click', (e) => {
    e.stopPropagation();
    current = (current + 1) % images.length;
    lightboxImg.src = images[current].src;
    lightboxImg.alt = images[current].alt;
  });

  document.addEventListener('keydown', (e) => {
    if (!lightbox.classList.contains('open')) return;
    if (e.key === 'Escape') closeLightbox();
    if (e.key === 'ArrowLeft')  document.getElementById('lightboxPrev').click();
    if (e.key === 'ArrowRight') document.getElementById('lightboxNext').click();
  });
</script>
</body>
</html>
